      follower_retriever_config_path: ""
      i2i_retriever_config_path: ""
      two_tower_retriever_config_path: ""
    waitingSuccess: true
    dependsOn:
      activities:
      - name: "Extraction"
        dependencyConditions:
        - "succeeded"
  - name: "Ranking"
    type: "execute_pipeline"
    pipelineName: "pl_dmp_oneapp_community_recommender_ranking"
    pipelineId: "22792d0ecd2a23231ab0910d55001266"
    projectId: "10926"
    bizDate: "${DATE}"
