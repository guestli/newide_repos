    type: "set_variable"
    description: "Set a pipeline variable"
    variableType: "PIPELINE_INNER"
    variableName: "run_date"
    value:
      rawValue: "@formatDateTime(addDays(addHours(utcnow(),8),-1),'yyyy-MM-dd')"
