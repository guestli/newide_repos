    waitingSuccess: true
    dependsOn:
      activities:
      - name: "ForEach1"
        dependencyConditions:
        - "succeeded"
  parameters:
  - name: "LogEnabled"
    default: "1"
  - name: "TableName"
    default: "ALL"
  - name: "PartitionID"
    default: ""
  - name: "is_header"
    default: "True"
  - name: "StartDate"
    default: ""
  - name: "EndDate"
    default: ""
  variables:
  - name: "PartitionID"
    default: ""
  - name: "StartDate"
    default: ""
  - name: "EndDate"
    default: ""
  - name: "JobNameVar"
    default: ""
  schedulingResourceGroupName: "public_schedule"
  schedulingResourceGroupId: 1009
  dependsOn:
    pipelines: []
    self:
